<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Land Preview - Shion Iburi</title>
  <style>
    html,body{
      margin:0;
      min-height:100%;
      background:#202832;
      color:#e8eef2;
      font-family:Georgia,"Times New Roman",serif;
    }

    body{
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:24px;
      gap:14px;
    }

    .note{
      width:730px;
      max-width:100%;
      box-sizing:border-box;
      font-size:14px;
      line-height:1.45;
      color:#cbd6dc;
      background:rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.12);
      padding:12px 14px;
    }

.land-frame iframe{
  width:730px;
  height:640px;
  border:0;
  display:block;
  overflow:hidden;
  background:#030607;
}

    .land-frame iframe{
      width:730px;
      height:640px;
      border:0;
      display:block;
      background:#030607;
    }

    code{color:#d8adff;}
  </style>
</head>
<body>
  <div class="note">
    <strong>Preview land 730×640.</strong><br>
    Questa pagina simula il box reale della land e applica automaticamente <code>shion-land-v9.css</code> sopra la scheda principale.
  </div>

  <div class="land-frame">
    <iframe id="landPreview" src="index.html?v=preview"></iframe>
  </div>

  <script>
    const iframe = document.getElementById('landPreview');

    iframe.addEventListener('load', () => {
      const doc = iframe.contentDocument || iframe.contentWindow.document;

      const link = doc.createElement('link');
      link.rel = 'stylesheet';
      link.href = 'shion-land-v9.css?v=preview-' + Date.now();
      doc.head.appendChild(link);

      const fix = doc.createElement('style');
      fix.textContent = `
        html,body{
          margin:0!important;
          padding:0!important;
          width:730px!important;
          height:640px!important;
          overflow:hidden!important;
          background:#030607!important;
        }
      `;
      doc.head.appendChild(fix);
    });
  </script>
</body>
</html>
