<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Land Preview - Shion Iburi</title>
  <style>
    html,body{margin:0;min-height:100%;background:#202832;color:#e8eef2;font-family:Georgia,'Times New Roman',serif;}
    body{display:flex;flex-direction:column;align-items:center;padding:24px;gap:14px;}
    .note{width:730px;max-width:100%;font-size:14px;line-height:1.45;color:#cbd6dc;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.12);padding:12px 14px;box-sizing:border-box;}
    .land-frame{width:730px;height:640px;max-width:100%;overflow:hidden;position:relative;background:#030607;border:1px solid rgba(255,230,0,.35);box-shadow:0 0 0 12px rgba(0,0,0,.16),0 0 30px rgba(0,0,0,.55);}
    .land-frame iframe{width:730px;height:640px;border:0;display:block;}
    code{color:#d8adff;}
  </style>
</head>
<body>
  <div class="note">
    <strong>Preview land 730×640.</strong><br>
    Questa cornice simula la dimensione reale del box della land. Per ora mostra la pagina principale dentro un riquadro fisso. La versione più fedele sarà quella con lo stesso HTML land + <code>shion-land-v9.css</code>.
  </div>
  <div class="land-frame">
    <iframe src="index.html"></iframe>
  </div>
</body>
</html>
