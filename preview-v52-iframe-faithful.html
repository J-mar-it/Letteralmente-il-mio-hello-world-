<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Preview V52 Iframe Faithful - Shion Iburi</title>
  <style>
    *{box-sizing:border-box}
    html,body{
      margin:0;
      min-height:100%;
      background:#202832;
    }
    body{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
      padding:18px;
      font-family:MuseoSans,Arial,sans-serif;
      font-size:12px;
      text-align:center;
      color:#e8eef2;
    }
    .note{
      width:730px;
      max-width:100%;
      padding:8px 10px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(0,0,0,.35);
      color:#dfe8ee;
    }
    .iframe-wrap{
      width:730px;
      height:820px;
      padding:0;
      margin:0 auto;
      border:1px solid rgb(0,0,0);
      background:#030607;
      overflow:hidden;
    }
    .iframe-wrap iframe{
      display:block;
      width:730px;
      height:820px;
      border:0;
      margin:0;
      padding:0;
      background:#030607;
    }
  </style>
</head>
<body>
  <div class="note">Preview V52 con iframe reale 730 × 820, come struttura più vicina alla land.</div>
  <div class="iframe-wrap">
    <iframe src="preview-v52.html?v=1" title="Preview V52"></iframe>
  </div>
</body>
</html>
