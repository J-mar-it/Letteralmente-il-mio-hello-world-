<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shion Land-Ready Inline Preview</title>
  <style>
    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      background:#050407;
    }
    body{overflow-x:hidden;}
    #land-target{
      width:100%;
      min-height:100vh;
    }
    .preview-source-note{
      position:fixed;
      right:10px;
      bottom:10px;
      z-index:999999;
      font:12px/1.3 Georgia,"Times New Roman",serif;
      color:rgba(233,238,242,.55);
      background:rgba(0,0,0,.42);
      border:1px solid rgba(216,173,255,.18);
      border-radius:8px;
      padding:6px 8px;
      pointer-events:none;
      text-shadow:0 1px 2px #000;
    }
    .preview-error{
      display:none;
      position:fixed;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      z-index:999999;
      max-width:560px;
      padding:18px 20px;
      background:rgba(0,0,0,.74);
      border:1px solid rgba(255,120,160,.35);
      border-radius:12px;
      color:#ffb0be;
      font:15px/1.45 Georgia,"Times New Roman",serif;
      text-align:center;
    }
  </style>
</head>
<body>
  <div id="land-target"></div>
  <div class="preview-source-note">land-ready inline preview</div>
  <div id="preview-error" class="preview-error">Errore nel caricamento della preview.</div>

  <script>
    const htmlCommit = '954810d80a81cf4bb51be18355594b355d65940c';
    const cssCommit = 'aeb5b7194c16c639591315529677325be6c5921e';
    const repo = 'J-mar-it/Letteralmente-il-mio-hello-world-';
    const htmlUrl = `https://cdn.jsdelivr.net/gh/${repo}@${htmlCommit}/shion-official-preview.html?v=land-ready-inline-1`;
    const cssUrl = `https://cdn.jsdelivr.net/gh/${repo}@${cssCommit}/shion-land-v83-direct-land.css?v=1`;
    const target = document.getElementById('land-target');
    const errorBox = document.getElementById('preview-error');

    function toLandReadySource(html){
      const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
      let source = bodyMatch ? bodyMatch[1] : html;
      source = `<style>@import url("${cssUrl}");</style>` + source;
      return source
        .replace(/name="side-tabs" id="left-none" checked/g, 'name="left-tabs" id="left-none" checked')
        .replace(/name="side-tabs" id="left-venom"/g, 'name="left-tabs" id="left-venom"')
        .replace(/name="side-tabs" id="left-pulse"/g, 'name="left-tabs" id="left-pulse"')
        .replace(/name="side-tabs" id="left-mark"/g, 'name="left-tabs" id="left-mark"')
        .replace(/name="side-tabs" id="right-none" checked/g, 'name="right-tabs" id="right-none" checked')
        .replace(/name="side-tabs" id="right-vapor"/g, 'name="right-tabs" id="right-vapor"')
        .replace(/name="side-tabs" id="right-keepsake"/g, 'name="right-tabs" id="right-keepsake"')
        .replace(/name="side-tabs" id="right-need"/g, 'name="right-tabs" id="right-need"')
        .replace('<div class="tab-panel vapor-panel"><h3>Property</h3><p>Ciò che considera suo<br>non sempre porta un nome.<br><br>A volte è un oggetto.<br>A volte un luogo.<br>A volte una persona<br>che non lo sa ancora.</p></div>', '<div class="tab-panel vapor-panel"><h3>Property</h3><p>Ciò che considera suo non sempre<br> porta un nome.<br>A volte è un oggetto.<br>A volte un luogo.<br>A volte una persona<br>che non lo sa ancora.</p></div>')
        .replace('<section class="screen stage-screen easy-screen"><div class="stage"><div class="room-bg"></div><div class="veil"></div><div class="easy-potion"></div><div class="easy-text"><p><span class="easy-gradient-text">Tornerai.. Non puoi farne a meno ♡</span></p></div><label for="flow-blackout" class="action-btn center-btn">bevi</label></div></section>', '<section class="screen stage-screen easy-screen"><div class="stage"><div class="room-bg"></div><div class="veil"></div><div class="easy-potion"></div><div class="easy-text"><p><span class="easy-gradient-text"><span class="easy-glow-word">Tornerai..&nbsp;</span><span class="easy-glow-word">Non&nbsp;</span><span class="easy-glow-word">puoi&nbsp;</span><span class="easy-glow-word">farne&nbsp;</span><span class="easy-glow-word">a&nbsp;</span><span class="easy-glow-word">meno&nbsp;</span><span class="easy-glow-word">♡</span></span></p></div><label for="flow-blackout" class="action-btn center-btn">bevi</label></div></section>')
        .replace('<section class="screen stage-screen blackout-screen"><div class="stage blackout-stage"><div class="blackout-face"></div><div class="blackout-layer"></div><div class="blackout-vision"></div><div class="blackout-text"><p>Mi appartieni. Vivo o morto. Non mi importa.</p></div><label for="flow-intro" class="action-btn center-btn">risvegliati</label></div></section>', '<section class="screen stage-screen blackout-screen"><div class="stage blackout-stage"><div class="blackout-face"></div><div class="blackout-layer"></div><div class="blackout-vision"></div><div class="blackout-text"><p>\n  <span class="blackout-line line-possess">Mi appartieni~</span>\n  <span class="blackout-line line-dead">Vivo o morto..</span>\n  <span class="blackout-line line-cold">Non mi importa.</span>\n</p></div><label for="flow-intro" class="action-btn center-btn">risvegliati</label></div></section>');
    }

    fetch(htmlUrl)
      .then(response => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.text();
      })
      .then(html => {
        target.innerHTML = toLandReadySource(html);
      })
      .catch(error => {
        console.error('Shion inline preview load failed:', error);
        errorBox.style.display = 'block';
      });
  </script>
</body>
</html>
