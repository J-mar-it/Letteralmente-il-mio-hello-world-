<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shion Land Test Preview</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      background:#050407;
      color:#e9eef2;
      font-family:Georgia,"Times New Roman",serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
      padding:28px 16px 36px;
    }
    .preview-header{
      width:min(920px,100%);
      text-align:center;
    }
    .preview-header h1{
      margin:0 0 8px;
      font-size:24px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:#d8adff;
      text-shadow:0 0 18px rgba(155,60,255,.28);
    }
    .preview-header p{
      margin:4px 0;
      color:rgba(233,238,242,.72);
      font-size:14px;
      line-height:1.45;
    }
    .frame-shell{
      width:730px;
      max-width:100%;
      height:820px;
      border:1px solid rgba(216,173,255,.28);
      border-radius:14px;
      overflow:hidden;
      box-shadow:0 0 34px rgba(140,58,210,.22),0 18px 60px rgba(0,0,0,.5);
      background:#030607;
    }
    iframe{
      display:block;
      width:730px;
      max-width:100%;
      height:820px;
      border:0;
      background:#030607;
    }
    .preview-note{
      width:min(920px,100%);
      color:rgba(233,238,242,.62);
      font-size:13px;
      text-align:center;
      line-height:1.45;
    }
    code{color:#d8adff}
  </style>
</head>
<body>
  <header class="preview-header">
    <h1>Shion Land Test Preview</h1>
    <p>Preview pulita fuori dalla land, con viewport di confronto <code>730×820</code>.</p>
    <p>Il contenuto carica <code>shion-clean.html</code> dal commit <code>954810d80a81cf4bb51be18355594b355d65940c</code>.</p>
  </header>

  <main class="frame-shell">
    <iframe
      title="Shion clean preview"
      src="https://cdn.jsdelivr.net/gh/J-mar-it/Letteralmente-il-mio-hello-world-@954810d80a81cf4bb51be18355594b355d65940c/shion-clean.html?v=land-test-1"
      loading="eager"
      referrerpolicy="no-referrer">
    </iframe>
  </main>

  <p class="preview-note">
    Se questa preview funziona ma la land no, il problema è probabilmente causato dal contenitore/CSS della land.
  </p>
</body>
</html>
